name: future_student
description: "Future Student - A comprehensive platform for tertiary education guidance"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  get: ^4.6.0
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.13.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  
  # UI & Forms
  intl: ^0.19.0
  table_calendar: ^3.0.0
  form_validator: ^0.0.2
  uuid: ^4.0.0
  
  # HTTP & Networking
  dio: ^5.3.0
  
  # Utilities
  logger: ^2.0.0
  get_storage: ^2.1.1
  
  # Icons
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^2.0.0
  
  # Testing
  mockito: ^5.4.0
  build_runner: ^2.4.0
  
  # Code generation for Hive
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/data/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
